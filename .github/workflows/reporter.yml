name: reporter

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema pytest

      - name: Reporter golden tests
        run: python tests/reporter/check-reporter.py

      - name: Reporter unit tests
        run: python -m pytest tests/reporter/ -q
