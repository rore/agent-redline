name: agent-redline

# Push-driven flow: this branch demonstrates the push-mode CI shape.
# - Trigger fires on `push: branches: [main]` rather than `pull_request:`.
# - The verdict surfaces in $GITHUB_STEP_SUMMARY (visible at the top of
#   the run page on github.com — one click from the commit) AND as a
#   dedicated Check Run posted via the Checks API. The Check Run's
#   conclusion (success / action_required / failure) controls the icon
#   shown in the commit-list and branch view.
# - The workflow job itself fails CI ONLY on EXIT == 2 (binding-mode
#   hard fail). EXIT == 1 (red-zone touch / unsatisfied checkpoint /
#   warning) is surfaced via the orange `action_required` Check Run +
#   the run summary; the workflow stays green so unrelated downstream
#   jobs aren't blocked by an informational signal.

on:
  # Push-driven flow demo: fires on push to the long-lived branch
  # (push-demo-main) AND on push to any push-demo-* scenario branch.
  # In a real push-driven repo, this would be `branches: [main]` only —
  # the multi-branch trigger here is a demo affordance so each scenario
  # branch (push-demo-blue-only, push-demo-red-zone-change, etc.) can
  # produce its own independent CI run when pushed.
  push:
    branches:
      - push-demo-main
      - 'push-demo-*'

permissions:
  contents: read
  checks: write   # required to post the agent-redline Check Run

jobs:
  boundary:
    name: Boundary check (import-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run import-linter via adapter
        run: |
          mkdir -p build
          python scripts/run-import-linter.py --out build/import-linter-report.json
        # Exits 1 on violations; reporter step surfaces them. Drop this
        # once shadow window is done.
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: boundary-report
          path: build/import-linter-report.json
          if-no-files-found: error

  report:
    name: agent-redline report
    needs: boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: boundary-report
          path: build/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml jsonschema

      - name: Run reporter
        id: report
        # See extensions/python/scaffold.md §5b for the full rationale
        # behind the canonical pattern (set +e + EXIT capture + GITHUB_OUTPUT
        # publish + summary surface + enforce-on-non-zero).
        #
        # Push-mode-specific: BEFORE/AFTER diff handles "first push to a
        # branch" (BEFORE is all-zeros) and force-push (BEFORE may be a
        # SHA the runner doesn't have) by falling back to merge-base
        # against the default branch.
        run: |
          set +e
          mkdir -p build
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          # In a real push-mode setup, the long-lived branch is "main" and the
          # fallback would be `origin/main`. This demo lives alongside the PR-
          # mode demo on the same repo, so its long-lived branch is named
          # `push-demo-main` instead — the fallback chases that, then degrades
          # to AFTER^ if even that ref is not present.
          BASE_REF="origin/push-demo-main"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" || -z "$BEFORE" ]] || \
             ! git rev-parse --verify "$BEFORE^{commit}" >/dev/null 2>&1; then
            BEFORE="$(git merge-base "$BASE_REF" "$AFTER" 2>/dev/null || echo "$AFTER^")"
          fi
          git diff --name-only "$BEFORE"..."$AFTER" > build/changed-files.txt
          LINES_CHANGED=$(git diff --shortstat "$BEFORE"..."$AFTER" \
            | awk '{for (i=1;i<=NF;i++) if ($i ~ /insertions?|deletions?/) s+=$(i-1)} END{print s+0}')
          python scripts/agent-redline-report.py \
            --policy agent-policy.yaml \
            --changed-files build/changed-files.txt \
            --lines-changed "${LINES_CHANGED:-0}" \
            --json-out build/verdict.json \
            --comment-out build/comment.md
          EXIT=$?
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          echo "--- verdict.json ---" && cat build/verdict.json
          echo "--- comment.md ---" && cat build/comment.md
          echo "reporter exit code: $EXIT"

      - name: Write verdict to job summary
        # Without a PR sticky comment, the run page's summary is the
        # primary visibility surface. Appending comment.md to
        # $GITHUB_STEP_SUMMARY makes the verdict show up at the top of
        # the workflow run on github.com — one click from the commit,
        # no artifact download required.
        if: always()
        run: |
          {
            echo "## agent-redline verdict"
            echo
            cat build/comment.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verdict artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-redline-verdict
          path: |
            build/verdict.json
            build/comment.md

      - name: Post agent-redline Check Run
        # Posts a Check Run keyed to the commit SHA. Conclusion -> icon
        # in the commit-list/branch view: success (green), action_required
        # (orange — distinct from a red failure; surfaces in the commit
        # list and triggers notifications), failure (red).
        # "Details" link points at this run's summary.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXIT="${{ steps.report.outputs.exit_code }}"
          case "$EXIT" in
            0) CONCLUSION="success"          ;;
            1) CONCLUSION="action_required"  ;;
            *) CONCLUSION="failure"          ;;
          esac
          SUMMARY_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # head -c is a safety belt for Check Run's 65535-byte text limit
          BODY="$(head -c 60000 build/comment.md)"
          jq -n \
            --arg name      "agent-redline" \
            --arg head_sha  "${{ github.sha }}" \
            --arg conclusion "$CONCLUSION" \
            --arg details_url "$SUMMARY_URL" \
            --arg title     "agent-redline: $(jq -r .verdict build/verdict.json)" \
            --arg summary   "$BODY" \
            '{name:$name, head_sha:$head_sha, status:"completed",
              conclusion:$conclusion, details_url:$details_url,
              output:{title:$title, summary:$summary}}' \
            > build/check-run.json
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/check-runs" \
            --input build/check-run.json

      - name: Enforce reporter exit code
        # Push-mode: fail only on exit 2 (binding-mode hard fail). Exit 1
        # (red-zone touch / unsatisfied checkpoint / warning) is surfaced
        # via the orange `action_required` Check Run + run summary above —
        # no need to fail the workflow on it.
        run: |
          EXIT="${{ steps.report.outputs.exit_code }}"
          if [[ "$EXIT" == "2" ]]; then
            echo "Reporter exited 2 (binding-mode hard fail). Failing the report check."
            echo "See the run summary above (or the agent-redline-verdict artifact) for the full verdict."
            exit 1
          fi
          echo "Reporter exited $EXIT — non-blocking."
