# tests/budget/budget.yaml
#
# Token-budget ceilings for every file loaded into an agent's context.
#
# Source of truth: SPEC §1.4.1. If this file and SPEC disagree, SPEC wins.
#
# Estimator: approx_tokens = words * 1.33 (whitespace-separated words).
# This is a fast, deliberately rough approximation. It overestimates slightly on
# prose (good — gives margin) and underestimates on code-heavy files (acceptable —
# code is rare in skill files). A real tokenizer can be substituted later without
# changing the budget contract.
#
# Pattern matching: a glob may apply to multiple files; in that case the ceiling
# applies to each file individually.

version: 1

ceilings:
  # Project-root AGENTS.md — auto-loaded by harnesses on session start when
  # an agent is working on this project. Same ceiling as a generated AGENTS.md
  # in a consuming repo: keep orientation cheap.
  - path: AGENTS.md
    max_tokens: 1000
    why: auto-loaded by harnesses on session start while developing agent-redline

  # Core skill — loaded into every agent session in an agent-redline-aware repo.
  - path: core/skill/agent-redline.md
    max_tokens: 800
    why: loaded on every session
  - path: core/skill/operating-mode.md
    max_tokens: 1500
    why: loaded on every operating-mode turn
  - path: core/skill/bootstrap-mode.md
    max_tokens: 3000
    why: loaded only during bootstrap (rare). Carries the Phase 3b
      data-driven calibration step (PR-history AND push-history
      firing-rate tuning with developer approval), the Phase 4
      templates-discipline rules, shape-selection triage for
      multi-shape extensions (Python's three layouts), and flow-mode
      triage (PR-driven vs push-driven CI shape).

  # Per-checkpoint skill docs — each loaded only when its checkpoint is triggered.
  - path: core/templates/skills/*.md
    max_tokens: 600
    why: loaded only when the relevant checkpoint is triggered

  # Stack-neutral templates that are read by the agent.
  - path: core/templates/agent-policy.yaml.template
    max_tokens: 1500
    why: read every operating-mode turn after bootstrap copies it
  - path: core/templates/AGENTS.md.template
    max_tokens: 1000
    why: read on session start after bootstrap copies it

  # Language-extension files.
  - path: extensions/*/profile.md
    max_tokens: 2700
    why: loaded during bootstrap. Python's profile carries three layout
      variants (src-layout / flat / multi-package), Django addendum, the
      two-vocabularies clarification (import-linter syntax vs
      agent-redline `boundaries:` schema syntax), and load-bearing
      import-linter knob notes (allow_indirect_imports for forbidden
      contracts in multi-package; ancestors field for acyclic_siblings).
  - path: extensions/*/scaffold.md
    max_tokens: 2800
    why: loaded during scaffold phase of bootstrap. Carries the
      complete CI-workflow report-step pattern (set +e, capture exit,
      sticky-comment action, enforce-on-exit-2 step) AND the parallel
      push-driven flow (no sticky comment, BEFORE/AFTER diff with
      merge-base fallback, fail-on-1-or-2 enforcement). The agent loads
      whichever subsection matches the flow mode picked in Phase 1.
  - path: extensions/*/operating.md
    max_tokens: 600
    why: loaded during operating mode if the extension provides one
  - path: extensions/*/README.md
    max_tokens: 1000
    why: human-facing summary; not loaded by the agent but kept lean for consistency
