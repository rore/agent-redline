# Policy for the api-changed-controllers fixture.
# Uses api.type=openapi-from-controllers so the reporter consumes the
# api-spec-base / api-spec-head pair (workflow-supplied) rather than
# detecting api change via a committed spec path.
version: 1

project:
  name: api-from-controllers-fixture
  extension: jvm-archunit

zones:
  red:
    - path: src/main/java/**/domain/**
      reason: domain
      checkpoint: architecture-review
    - path: src/main/java/**/*Controller.java
      reason: API surface
      checkpoint: api-review
    - path: src/test/java/**/architecture/**
      reason: arch test definitions
      checkpoint: architecture-review
  blue:
    - path: src/test/**
      reason: tests

api:
  type: openapi-from-controllers
  generationCommand: ./gradlew :app:generateOpenApi
  diffMode: structural
  checkpoint: api-review

checkpoints:
  architecture-review:
    satisfiedBy:
      - codeownerApproval
      - label: architecture-reviewed
  api-review:
    satisfiedBy:
      - label: api-reviewed

modes:
  default: shadow
  perCheck:
    boundary_violation: binding
