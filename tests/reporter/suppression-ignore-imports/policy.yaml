version: 1
project:
  name: example
zones:
  red:
    - path: pyproject.toml
      reason: contract config
      checkpoint: architecture-review
    - path: src/example/domain/**
      reason: domain
      checkpoint: architecture-review
  blue:
    - path: tests/**
      reason: tests
suppressions:
  useExtensionDefaults: true
  exemptPaths: ["**/tests/**"]
checkpoints:
  architecture-review:
    satisfiedBy:
      - codeownerApproval
      - label: architecture-reviewed
modes:
  default: shadow
